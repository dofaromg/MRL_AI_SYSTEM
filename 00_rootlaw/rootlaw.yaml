# MRL AI System — Root Law (L0 ROOT + L3 LAW)
# Immutable foundational constraints. Never deleted; only extended by versioned amendments.

version: 2
layer: L0_ROOT

meta:
  description: >-
    Canonical invariants for the MRL AI System. These rules supersede all other
    policies and cannot be overridden at runtime.
  updated_by: system
  sealed: "2026-02-15"
  origin_signature: MrLiouWord

# ─── Liou Closure Law ────────────────────────────────────────────────────────
#   Loop: Observe → Resolve → Mirror → Verify → Loop
#   Three Laws:
#     1. Authority Invariance — the authoritative source cannot be silently replaced
#     2. No-Delete           — canonical chain entries are never deleted
#     3. Additive Resolution — resolutions extend the chain; they never mutate it
#   Three Corollaries:
#     1. No closed-loop     ⇒ external control
#     2. No write-back      ⇒ state corruption / brainwashing
#     3. No proof           ⇒ rhetoric (unverifiable claim)
liou_closure_law:
  loop: "Observe → Resolve → Mirror → Verify → Loop"
  three_laws:
    authority_invariance: >-
      The authoritative source (origin_signature) cannot be silently replaced
      or overwritten at any layer.
    no_delete: >-
      Canonical chain entries must never be deleted or mutated.
      Rollback is only permitted via the proof-based rollback protocol.
    additive_resolution: >-
      All resolutions extend the immutable chain additively.
      No resolution may mutate or overwrite an existing entry.
  three_corollaries:
    no_loop_implies_control: >-
      A system without a closed verification loop is externally controllable.
    no_writeback_implies_corruption: >-
      A system that cannot write state back into its canonical store is
      susceptible to undetected state corruption (brainwashing).
    no_proof_implies_rhetoric: >-
      Any claim without a verifiable proof trace is rhetoric and must not be
      acted upon automatically.

# ─── LAW-0: Signature Law ────────────────────────────────────────────────────
#   T(e) = e'  ⟹  signature(e) = signature(e')
#   Interfaces: embedSignature / extractSignature / verifySignature
#   Layer path: L7 context.originSignature → L0 field[0].qstate.identity
law_0_signature:
  formula: "T(e) = e'  =>  signature(e) = signature(e')"
  origin_signature: MrLiouWord
  interfaces:
    - embedSignature
    - extractSignature
    - verifySignature
  layer_path: "L7 context.originSignature → L0 field[0].qstate.identity"
  implementation: "09_workflow/signature.js"

